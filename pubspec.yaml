name: the_safety_lamp_vault
description: "The Safety Lamp Vault — a heritage archive for collectors of vintage mining safety lamps."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Responsive layout
  flutter_screenutil: ^5.9.3

  # Fonts
  google_fonts: ^6.2.1

  # Storage
  shared_preferences: ^2.3.5

  # Unique IDs
  uuid: ^4.5.1

  # Image picking and storage
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Liquid glass glassmorphism effect
  liquid_glass_renderer: ^0.2.0-dev.4

  # Staggered grid
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#0E0C09"
  adaptive_icon_foreground: "assets/images/icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0E0C09"
  image: "assets/images/logo.png"
  android: true
  ios: true
  android_12:
    image: "assets/images/logo.png"
    color: "#0E0C09"

flutter:
  uses-material-design: true
